</head>

<body>

  <div id="swup" class="page-container transition-fade">
    <header class="bg-dark header">
      <nav class="nav flex ma align-item-cent">
        <!-- LOGO -->
        <div class="logo pl1"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_60/v1568542815/portfolio/logo_njziw2.png" alt="White T logo surrounded by a swirl"></div>
        <!-- Hamburger Menu -->
        <input id="toggle" class="hamburger-input" type="checkbox"></input>
        <label for="toggle" class="hamburger ">
          <div class="top-bun bg-white"></div>
          <div class="meat bg-white"></div>
          <div class="bottom-bun bg-white"></div>
        </label>
        <!-- Navigation Menu -->
        <div id="menu" class="menu-container bg-dark flex align-item-cent">
          <ul class="menu nav-menu">
            <a href="/index.html">
              <li class="nav-list">HOME</li>
            </a>
            <a href="/about.html">
              <li class="nav-list">ABOUT</li>
            </a>
            <a href="/portfolio.html">
              <li class="nav-list">PORTFOLIO</li>
            </a>
            <a href="/contact.html">
              <li class="nav-list">CONTACT</li>
            </a>
          </ul>
          <!-- Social Navigation Menu -->
          <ul class="menu social-menu">
            <li class="nav-social-icons email-icon email" data-clipboard-text="moran.tim01@gmail.com"><img
                src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/mail-white_osz0bp.png" alt="White envelope icon">
            </li>
            <a href="https://twitter.com/Tim__Moran" target="_blank">
              <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/twitter-white_bj6tuy.png" alt="White twitter bird icon"></li>
            </a>
            <a href="https://www.linkedin.com/in/tim-moran-388238193/" target="_blank">
              <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/linkedin-white_frj1e4.png" alt="White linkedin icon"></li>
            </a>
            <a href="https://github.com/tmoran18" target="_blank">
              <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/github-white_jsbq2s.png" alt="White github cat icon"></li>
            </a>
          </ul>
          <div class="tooltip">
            <span class="tooltiptext shadow bg-light-grey text-cent">Click to copy my email address to your clipboard</span>
          </div>
        </div>
      </nav>
    </header>
    <main>
      <section class="contact">

        <div class="wrapper mt3">

          <h2 class="font-40 font-weight-400 text-cent mb1">Get In Touch</h2>
          <p class="contact-para font-16 text-cent line-h-2 mb2 ma ">Whether you have a question, want to start a project or simply want to connect.
            Feel free to send me a message in the contact form.</p>
          <div class="form-wrapper ma">
            <form name="contact" method="POST" data-netlify="true">
                <p class="hidden">
                    <label>Don’t fill this out if you're human: <input name="bot-field" /></label>
                  </p>
              <label for="contact_name"></label>
              <input type="text" name="name" id="contact_name" placeholder="Name..." class="font-16 mb1">
              <label for="contact_email"></label>
              <input type="email" name="email" id="contact_email" placeholder="Email..." class="font-16 mb1">
              <label for="contact_subject"></label>
              <input type="text" name="subject" id="contact_subject" placeholder="Subject..." class="font-16 mb1">
              <label for="contact_message"></label>
              <textarea name="message" id="contact_message" cols="30" rows="10" class="font-16 mb1">Message...</textarea>
              <input type="submit" value="SEND" class="submit-button font-16
              font-weight-700">
            </form>
          </div>

        </div>

      </section>
    </main>

    <script src="swup.min.js"></script>
    <script src="index.js"></script>

</body>

</html>

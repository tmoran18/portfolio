<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Tim Moran - Portfolio</title>
  <link rel="stylesheet" href="normalize.css">
  <link rel="stylesheet" href="styles.css">

</head>

<body>
  <div id="swup" class="page-container transition-fade">
    <header>
      <nav>
        <!-- LOGO -->
        <div class="logo"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_60/v1568542815/portfolio/logo_njziw2.png" alt="White T logo surrounded by a swirl"></div>
        <!-- Hamburger Menu -->
        <input id="toggle" class="hamburger-input" type="checkbox"></input>
        <label for="toggle" class="hamburger">
          <div class="top-bun"></div>
          <div class="meat"></div>
          <div class="bottom-bun"></div>
        </label>
        <!-- Navigation Menu -->
        <div id="menu" class="menu-container">
          <ul class="menu nav-menu">
            <a href="/index.html">
              <li class="nav-list">HOME</li>
            </a>
            <a href="/about.html">
              <li class="nav-list">ABOUT</li>
            </a>
            <a href="">
              <li class="nav-list">PORTFOLIO</li>
            </a>
            <a href="">
              <li class="nav-list">CONTACT</li>
            </a>
          </ul>
          <!-- Social Navigation Menu -->
          <ul class="menu social-menu">
            <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/mail-white_osz0bp.png" alt="White envelope icon"></li>
            <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/twitter-white_bj6tuy.png" alt="White twitter bird icon"></li>
            <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/linkedin-white_frj1e4.png" alt="White linkedin icon"></li>
            <li class="nav-social-icons"><img src="https://res.cloudinary.com/dsjhcek2q/image/upload/c_scale,w_32/v1568546495/portfolio/github-white_jsbq2s.png" alt="White github cat icon"></li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <section class="contact">
        <img src="./images/map.jpg" class="form-bg-image" alt="Grey map of Brisbane City">
        <div class="form-wrapper">
          <div class="form-container">
            <div class="form-circle-top">
              <img src="./images/phone-book.png" width="40px" alt="">
            </div>
            <h2>Get in Touch</h2>
            <form action="">
              <div class="form-name-fields">
                <input class="text-m" aria-label="First Name" type="text" name="First-Name" placeholder="First Name" required />
                <input class="text-m" aria-label="Last Name" type="text" name="Last-Name" placeholder="Last Name" required />
              </div>
              <input class="text-m" aria-label="email" type="email" name="email" placeholder="Your email address" required />
              <div class="textarea-message-container">
                <textarea class="text-m messageArea" onfocus="focus(this)" aria-label="message" rows="4" name="message" placeholder="Write your message here ..."></textarea>
              </div>
              <input type="submit" value="Submit" />
            </form>
          </div>
        </div>
      </section>
      <footer>
        <div class="footer-container">
          <p class="text-m">&copy; Tim Moran 2019</p>
          <ul class="text-m footer-nav">
            <li><a href="/index.html">HOME</a></li>
            <li><a href="/about.html">ABOUT</a></li>
            <li><a href="/index.html">PORTFOLIO</a></li>
            <li><a href="/index.html">CONTACT</a></li>
          </ul>
        </div>
      </footer>
    </main>

    <script src="swup.min.js"></script>
    <script src="index.js"></script>

</body>

</html>
